<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Códex">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6E8BFF"></stop><stop offset=".55" stop-color="#3E54E0"></stop><stop offset="1" stop-color="#161E6E"></stop>
    </linearGradient>
    <radialGradient id="sheen" cx="0.28" cy="0.12" r="0.85">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".4"></stop><stop offset=".55" stop-color="#ffffff" stop-opacity="0"></stop>
    </radialGradient>
    <pattern id="grid" width="14" height="14" patternUnits="userSpaceOnUse">
      <path d="M14 0 H0 V14" fill="none" stroke="#ffffff" stroke-opacity=".06" stroke-width="1"></path>
    </pattern>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="3.2" result="b"></feGaussianBlur><feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="cs" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="1.3" stdDeviation="1.1" flood-color="#0a0e3a" flood-opacity=".35"></feDropShadow>
    </filter>
    <clipPath id="clip"><rect x="4" y="4" width="112" height="112" rx="30"></rect></clipPath>
  </defs>
  <rect x="4" y="4" width="112" height="112" rx="30" fill="url(#tile)"></rect>
  <g clip-path="url(#clip)">
    <rect x="4" y="4" width="112" height="112" fill="url(#grid)"></rect>
    <rect x="4" y="4" width="112" height="64" fill="url(#sheen)"></rect>
    <path d="M50 32 L31 60 L50 88" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#cs)"></path>
    <path d="M70 32 L89 60 L70 88" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity=".8"></path>
    <line x1="60" y1="28" x2="60" y2="92" stroke="#9CA2FF" stroke-width="9" stroke-linecap="round" filter="url(#glow)"></line>
    <line x1="60" y1="30" x2="60" y2="90" stroke="#F2F3FF" stroke-width="3.4" stroke-linecap="round"></line>
  </g>
  <rect x="4.75" y="4.75" width="110.5" height="110.5" rx="29.3" fill="none" stroke="#ffffff" stroke-opacity=".24" stroke-width="1.5"></rect>
</svg>
